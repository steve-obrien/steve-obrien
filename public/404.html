<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Page not found | Steve O'Brien</title>
		<style>
			:root {
				color-scheme: light;
				--background: #f7f8fa;
				--surface: #ffffff;
				--primary: #111827;
				--secondary: #475569;
				--border: #e2e8f0;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					color-scheme: dark;
					--background: #0a0e17;
					--surface: #0f172a;
					--primary: #f1f5f9;
					--secondary: #94a3b8;
					--border: #1e293b;
				}
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 1.5rem;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: var(--background);
				color: var(--primary);
			}

			main {
				width: 100%;
				max-width: 32rem;
				padding: 2rem;
				border: 1px solid var(--border);
				border-radius: 1rem;
				background: var(--surface);
			}

			h1 {
				margin: 0;
				font-size: clamp(2rem, 4vw, 2.6rem);
				letter-spacing: -0.02em;
			}

			p {
				margin: 1rem 0 0;
				color: var(--secondary);
				line-height: 1.6;
			}

			a {
				display: inline-block;
				margin-top: 1.5rem;
				padding: 0.65rem 1rem;
				border-radius: 9999px;
				border: 1px solid var(--border);
				color: inherit;
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>404</h1>
			<p>
				This page could not be found. The link may be outdated, or the page may have moved.
			</p>
			<a href="/">Back to home</a>
		</main>
	</body>
</html>
